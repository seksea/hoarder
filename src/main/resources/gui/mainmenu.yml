title: "<yellow>Hoarder</yellow> | Main Menu"

# The layout of the UI
#  a-Z = custom items that you can customise below (cannot be taken)
#  . = empty space that are completely locked, cannot have items dragged in
#  _ = custom area, this is used for things such as the feed menu, lets the menu decide how to handle this area
layout: |
  . . . . . . . . .
  . . . . . . . . .
  . . . . . . . . .
  . . . . H . . . .
  . . L . . . P . .
  . . . . S . . . .

# Define the items to fill the layout with, the only thing that matters here is the "id", as that controls what
# the button does, so don't change that, everything else is cosmetic and can be customised.
items:
  H:
    id: "hoarder"
    material: BARRIER
    name: ""
    lore: "<grey>The <yellow>hoarder</yellow> is not accepting items right now.</grey>" # this is set based on the message "gui.main-menu.feed-btn-lore"
  L:
    id: "leaderboard"
    material: BOOK
    name: "<white>Leaderboard</white>"
    lore: |
      <grey>View the leaderboard for this event</grey>
      <grey>and total leaderboard for all events.</grey>
  P:
    id: "prizes"
    material: GOLDEN_CARROT
    name: "<white>Prizes</white>"
    lore: "<grey>Collect prizes won from previous hoarder events.</grey>" # uses "gui.main-menu.prize-lore-won-prize" when a prize has been won
  S:
    id: "playerstats"
    material: PLAYER_HEAD
    name: "<white>Player Stats</white>"
    lore: "<grey>blah blah</grey>" # this is set based on the message "gui.main-menu.player-stats-lore"